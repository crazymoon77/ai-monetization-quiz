<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 수익화 단계 진단기</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --card: #1a1a26;
    --border: #2a2a3e;
    --accent: #7c6fff;
    --accent2: #ff6b9d;
    --accent3: #00d4aa;
    --text: #e8e8f0;
    --muted: #7070a0;
    --glow: rgba(124, 111, 255, 0.3);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    position: relative;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background: 
      radial-gradient(ellipse at 20% 20%, rgba(124,111,255,0.08) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 80%, rgba(255,107,157,0.06) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 50%, rgba(0,212,170,0.04) 0%, transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .container {
    width: 100%;
    max-width: 680px;
    position: relative;
    z-index: 1;
  }

  .header {
    text-align: center;
    margin-bottom: 40px;
    animation: fadeInDown 0.6s ease;
  }

  .header-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(124,111,255,0.15);
    border: 1px solid rgba(124,111,255,0.3);
    border-radius: 20px;
    padding: 5px 14px;
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .header h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(24px, 5vw, 36px);
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.15;
    margin-bottom: 10px;
  }

  .header h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .header p {
    color: var(--muted);
    font-size: 14px;
    font-weight: 300;
    line-height: 1.6;
  }

  .progress-wrap {
    margin-bottom: 32px;
    animation: fadeIn 0.6s ease 0.2s both;
  }

  .progress-meta {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    font-size: 12px;
    color: var(--muted);
  }

  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    box-shadow: 0 0 12px var(--glow);
  }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px;
    position: relative;
    overflow: hidden;
    animation: fadeInUp 0.5s ease;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: 0.5;
  }

  .q-number {
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .q-number::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .q-text {
    font-size: clamp(16px, 3vw, 20px);
    font-weight: 500;
    line-height: 1.55;
    margin-bottom: 28px;
    color: var(--text);
  }

  .options {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .option {
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px;
    cursor: pointer;
    transition: all 0.2s ease;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    text-align: left;
  }

  .option:hover {
    border-color: var(--accent);
    background: rgba(124,111,255,0.08);
    transform: translateX(4px);
  }

  .option.selected {
    border-color: var(--accent);
    background: rgba(124,111,255,0.15);
    box-shadow: 0 0 20px rgba(124,111,255,0.15);
  }

  .opt-icon {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    transition: background 0.2s;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    color: var(--muted);
  }

  .option.selected .opt-icon {
    background: var(--accent);
    color: white;
  }

  .opt-text {
    font-size: 14px;
    line-height: 1.5;
    color: var(--text);
    font-weight: 400;
  }

  .opt-sub {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 28px;
    gap: 12px;
  }

  .btn {
    padding: 12px 24px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s ease;
  }

  .btn-ghost {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary {
    background: linear-gradient(135deg, var(--accent), #6050e8);
    color: white;
    font-weight: 600;
    flex: 1;
    box-shadow: 0 4px 20px rgba(124,111,255,0.3);
    letter-spacing: 0.02em;
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 28px rgba(124,111,255,0.45);
  }

  .btn-primary:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  .result { animation: fadeInUp 0.6s ease; }

  .result-header {
    text-align: center;
    margin-bottom: 32px;
  }

  .stage-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    border-radius: 12px;
    padding: 8px 18px;
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  .stage-score {
    font-family: 'Syne', sans-serif;
    font-size: clamp(56px, 12vw, 80px);
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .stage-label {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
    font-family: 'Syne', sans-serif;
  }

  .stage-desc {
    color: var(--muted);
    font-size: 14px;
    line-height: 1.7;
    font-weight: 300;
  }

  .stage-map {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0;
    margin: 28px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 16px;
    overflow-x: auto;
  }

  .stage-step {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    flex: 1;
    min-width: 50px;
    position: relative;
    opacity: 0.35;
    transition: opacity 0.3s;
  }

  .stage-step.active { opacity: 1; }
  .stage-step.passed { opacity: 0.65; }

  .stage-dot {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    position: relative;
    z-index: 1;
    transition: all 0.3s;
  }

  .stage-step.active .stage-dot {
    background: var(--accent);
    box-shadow: 0 0 20px var(--glow);
  }

  .stage-name {
    font-size: 10px;
    text-align: center;
    color: var(--muted);
    line-height: 1.3;
    font-weight: 500;
  }

  .stage-step.active .stage-name {
    color: var(--accent);
    font-weight: 700;
  }

  .stage-connector {
    height: 2px;
    flex: 0.8;
    background: var(--border);
    margin-bottom: 18px;
  }

  .stage-connector.passed {
    background: linear-gradient(90deg, var(--accent), var(--border));
  }

  .insights {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 24px;
  }

  .insight-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }

  .insight-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }
  .insight-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 4px;
  }
  .insight-text { font-size: 13px; line-height: 1.6; color: var(--text); font-weight: 400; }

  .btn-restart {
    width: 100%;
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--muted);
    padding: 14px;
    border-radius: 12px;
    cursor: pointer;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.2s;
    margin-top: 8px;
  }

  .btn-restart:hover { border-color: var(--accent2); color: var(--accent2); }

  @keyframes fadeInDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-badge">🤖 AI Monetization Diagnostics</div>
    <h1>나의 AI 수익화<br><span>단계를 진단합니다</span></h1>
    <p>5가지 질문으로 현재 위치를 파악하고<br>다음 단계로 가는 전략을 제시합니다</p>
  </div>

  <div class="progress-wrap" id="progressWrap">
    <div class="progress-meta">
      <span id="progressLabel">질문 1 / 5</span>
      <span id="progressPct">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <div id="quizArea"></div>
  <div id="resultArea" style="display:none"></div>
</div>

<script>
const questions = [
  {
    q: "현재 AI 도구를 어떻게 활용하고 있나요?",
    options: [
      { text: "아직 본격적으로 사용하지 않음", sub: "ChatGPT 가끔 써보는 수준", score: 1, icon: "1" },
      { text: "개인 업무 효율화에 활용 중", sub: "문서 작성, 아이디어 탐색 등 보조 수단", score: 2, icon: "2" },
      { text: "특정 분야에서 결과물을 만들어 냄", sub: "콘텐츠, 코드, 보고서 등 산출물 생성", score: 3, icon: "3" },
      { text: "AI 기반 서비스·제품을 운영 중", sub: "유저가 있거나 수익이 발생하는 형태", score: 4, icon: "4" },
    ]
  },
  {
    q: "AI로 만든 결과물을 외부에 공개하거나 판매한 경험이 있나요?",
    options: [
      { text: "없음 — 내부 사용에만 머무름", sub: "", score: 1, icon: "A" },
      { text: "무료로 공유해 본 적은 있음", sub: "SNS, 블로그, 오픈소스 등", score: 2, icon: "B" },
      { text: "유료 판매나 외주 수익이 있음", sub: "프리랜서, 크몽, 디지털 상품 등", score: 3, icon: "C" },
      { text: "반복 가능한 수익 구조가 있음", sub: "구독, SaaS, 에이전시, 라이선스 등", score: 4, icon: "D" },
    ]
  },
  {
    q: "보유한 전문성(도메인 지식)은 어느 수준인가요?",
    options: [
      { text: "아직 명확한 전문 분야가 없음", sub: "탐색 중인 단계", score: 1, icon: "①" },
      { text: "특정 분야에 경험이 있음", sub: "직무·취미 기반의 지식 보유", score: 2, icon: "②" },
      { text: "업계에서 인정받는 전문성 있음", sub: "포트폴리오, 레퍼런스, 고객이 있음", score: 3, icon: "③" },
      { text: "도메인 + AI 결합으로 차별화 완성", sub: "타인이 쉽게 복제 못 하는 고유 역량", score: 4, icon: "④" },
    ]
  },
  {
    q: "AI 수익화를 위해 어떤 채널을 보유하고 있나요?",
    options: [
      { text: "특별한 채널 없음", sub: "SNS 팔로워, 뉴스레터 구독자 소수", score: 1, icon: "Ⅰ" },
      { text: "소규모 오디언스가 있음", sub: "팔로워 수백~수천 명 or 소셜 활동 중", score: 2, icon: "Ⅱ" },
      { text: "신뢰 기반 커뮤니티·네트워크 보유", sub: "지인 추천, 반복 고객이 생기는 구조", score: 3, icon: "Ⅲ" },
      { text: "유입과 전환이 자동화된 채널 운영", sub: "SEO, 유료광고, 파트너십 등 복수 채널", score: 4, icon: "Ⅳ" },
    ]
  },
  {
    q: "AI 수익화에서 가장 큰 현재 병목은 무엇인가요?",
    options: [
      { text: "무엇을 해야 할지 방향 자체가 없음", sub: "아이디어·시장·타겟 불명확", score: 1, icon: "?" },
      { text: "만들 수는 있지만 팔지 못함", sub: "마케팅·유통·가격 책정 어려움", score: 2, icon: "!" },
      { text: "초기 매출은 있지만 성장이 정체됨", sub: "반복 구매·확장·자동화 미흡", score: 3, icon: "↑" },
      { text: "운영 효율 및 팀·파트너 확장 필요", sub: "시스템·조직·자본 구조 고도화 단계", score: 4, icon: "★" },
    ]
  }
];

const stages = [
  {
    min: 5, max: 8,
    label: "탐색기", emoji: "🌱", color: "#00d4aa",
    colorBg: "rgba(0,212,170,0.15)", colorBorder: "rgba(0,212,170,0.3)",
    desc: "AI 수익화의 가능성을 인식하고 방향을 찾는 단계입니다. 핵심은 '무엇을 팔 것인가'보다 '내가 잘하는 것이 무엇인가'를 먼저 정의하는 것입니다.",
    next: "당장 할 수 있는 것: 주 3회 AI 도구 실습 → 내 도메인에서 작은 결과물 하나 만들기",
    risk: "가장 흔한 실수: 도구 공부에만 집중하고 실제 결과물을 만들지 않음",
    insight: "PM 관점 팁: 내 직무 경험 + AI = 즉시 차별화 가능. 도메인이 이미 자산임",
  },
  {
    min: 9, max: 13,
    label: "실험기", emoji: "⚡", color: "#7c6fff",
    colorBg: "rgba(124,111,255,0.15)", colorBorder: "rgba(124,111,255,0.3)",
    desc: "AI 결과물을 만들 수 있지만 아직 지속적인 수익 구조가 없는 단계입니다. '팔리는 것'을 검증하는 실험이 최우선입니다.",
    next: "다음 레버: 프리랜서 1건 → 소규모 디지털 상품 출시 → 첫 유료 고객 확보",
    risk: "가장 흔한 실수: 완벽한 제품을 만들려다 출시 시기를 놓침 (과도한 완성도 집착)",
    insight: "PM 관점 팁: MVP 개념을 수익화에 적용 — 완성도 80%짜리 빠른 출시가 정답",
  },
  {
    min: 14, max: 17,
    label: "성장기", emoji: "🚀", color: "#ff6b9d",
    colorBg: "rgba(255,107,157,0.15)", colorBorder: "rgba(255,107,157,0.3)",
    desc: "초기 수익이 증명됐지만 반복·자동화·확장이 미흡한 단계입니다. 이 구간에서 성패는 '레버리지 구조' 설계에 달려 있습니다.",
    next: "핵심 과제: 1) 재구매 구조 설계 2) 오디언스 자산화 3) 프로세스 문서화 → 위임",
    risk: "가장 흔한 실수: 고수익 클라이언트에 의존하다 성장 정체 (1:1 수익 트랩)",
    insight: "PM 관점 팁: 로드맵처럼 수익 레이어 설계 — 서비스 → 그룹 → 콘텐츠 → SaaS 순",
  },
  {
    min: 18, max: 20,
    label: "확장기", emoji: "🏆", color: "#ffd166",
    colorBg: "rgba(255,209,102,0.15)", colorBorder: "rgba(255,209,102,0.3)",
    desc: "AI 수익화가 시스템화된 단계입니다. 지금의 과제는 규모 확장보다 '방어력(해자)'을 높이고 새 수익 채널을 개척하는 것입니다.",
    next: "다음 레벨: 팀 빌딩 / 투자 유치 / IP 라이선싱 / 신규 시장 진입",
    risk: "가장 흔한 실수: 현재 모델에 과도하게 집착 — AI 기술 변화 속도 대비 유연성 부족",
    insight: "PM 관점 팁: 포트폴리오 접근 — 코어 비즈니스 70% + 실험 30% 비율 유지",
  }
];

const stageNames = ["탐색기", "실험기", "성장기", "확장기"];
const stageEmojis = ["🌱", "⚡", "🚀", "🏆"];

let current = 0, answers = [], selected = null;

function render() {
  const q = questions[current];
  const pct = Math.round((current / 5) * 100);
  document.getElementById('progressLabel').textContent = `질문 ${current + 1} / 5`;
  document.getElementById('progressPct').textContent = pct + '%';
  document.getElementById('progressFill').style.width = pct + '%';
  selected = null;
  document.getElementById('quizArea').innerHTML = `
    <div class="card">
      <div class="q-number">Q${current + 1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="options">
        ${q.options.map((o, i) => `
          <div class="option" onclick="selectOpt(${i})" id="opt-${i}">
            <div class="opt-icon">${o.icon}</div>
            <div class="opt-text">${o.text}${o.sub ? `<div class="opt-sub">${o.sub}</div>` : ''}</div>
          </div>
        `).join('')}
      </div>
      <div class="nav">
        ${current > 0 ? `<button class="btn btn-ghost" onclick="goBack()">← 이전</button>` : '<div></div>'}
        <button class="btn btn-primary" id="nextBtn" onclick="goNext()" disabled>
          ${current < 4 ? '다음 질문 →' : '결과 보기 ✦'}
        </button>
      </div>
    </div>
  `;
}

function selectOpt(i) {
  document.querySelectorAll('.option').forEach(el => el.classList.remove('selected'));
  document.getElementById('opt-' + i).classList.add('selected');
  selected = i;
  document.getElementById('nextBtn').disabled = false;
}

function goNext() {
  if (selected === null) return;
  answers[current] = questions[current].options[selected].score;
  if (current < 4) { current++; render(); }
  else { showResult(); }
}

function goBack() { current--; render(); }

function showResult() {
  const total = answers.reduce((a, b) => a + b, 0);
  const stage = stages.find(s => total >= s.min && total <= s.max);
  const stageIdx = stages.indexOf(stage);
  document.getElementById('progressLabel').textContent = '진단 완료';
  document.getElementById('progressPct').textContent = '100%';
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('resultArea').style.display = 'block';

  const mapHTML = stageNames.map((name, i) => {
    const cls = i === stageIdx ? 'active' : i < stageIdx ? 'passed' : '';
    return `
      <div class="stage-step ${cls}">
        <div class="stage-dot">${stageEmojis[i]}</div>
        <div class="stage-name">${name}</div>
      </div>
      ${i < stageNames.length - 1 ? `<div class="stage-connector ${i < stageIdx ? 'passed' : ''}"></div>` : ''}
    `;
  }).join('');

  document.getElementById('resultArea').innerHTML = `
    <div class="result">
      <div class="card">
        <div class="result-header">
          <div class="stage-badge" style="background:${stage.colorBg};border:1px solid ${stage.colorBorder};color:${stage.color}">${stage.emoji} ${stage.label}</div>
          <div class="stage-score" style="background:linear-gradient(135deg,${stage.color},var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text">${total}</div>
          <div class="stage-label">${stage.emoji} ${stage.label}</div>
          <div class="stage-desc">${stage.desc}</div>
        </div>
        <div class="stage-map">${mapHTML}</div>
        <div class="insights">
          <div class="insight-item"><div class="insight-icon">🎯</div><div class="insight-content"><div class="insight-label">Next Action</div><div class="insight-text">${stage.next}</div></div></div>
          <div class="insight-item"><div class="insight-icon">⚠️</div><div class="insight-content"><div class="insight-label">Risk Alert</div><div class="insight-text">${stage.risk}</div></div></div>
          <div class="insight-item"><div class="insight-icon">💡</div><div class="insight-content"><div class="insight-label">PM Insight</div><div class="insight-text">${stage.insight}</div></div></div>
        </div>
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:12px">
          <div style="font-size:11px;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;color:var(--muted);margin-bottom:10px">📊 질문별 점수 분포</div>
          <div style="display:flex;flex-direction:column;gap:7px">
            ${questions.map((q, i) => {
              const s = answers[i];
              const labels = ['탐색', '실험', '성장', '확장'];
              const pct = (s - 1) / 3 * 100;
              return `<div><div style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);margin-bottom:3px"><span>Q${i+1}</span><span style="color:${stage.color}">${labels[s-1]}</span></div><div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div style="height:100%;width:${pct}%;background:linear-gradient(90deg,${stage.color},var(--accent));border-radius:2px"></div></div></div>`;
            }).join('')}
          </div>
        </div>
        <button class="btn-restart" onclick="restart()">↺ 다시 진단하기</button>
      </div>
    </div>
  `;
}

function restart() {
  current = 0; answers = []; selected = null;
  document.getElementById('resultArea').style.display = 'none';
  document.getElementById('quizArea').style.display = 'block';
  render();
}

render();
</script>
</body>
</html>
